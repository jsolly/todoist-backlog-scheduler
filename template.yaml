AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Todoist Backlog Scheduler - distributes undated tasks across the week

Globals:
  Function:
    Timeout: 30
    MemorySize: 128

Parameters:
  SSMParameterName:
    Type: String
    Default: /todoist-backlog-scheduler/api-key
    Description: SSM Parameter Store path for the Todoist API key
  AlertTopicArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /alert-hub/alert-topic-arn
  GitSha:
    Type: String
    Default: unknown

Resources:
  SchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda_handler.handler
      Runtime: python3.13
      Environment:
        Variables:
          SSM_PARAMETER_NAME: !Ref SSMParameterName
          ALERT_TOPIC_ARN: !Ref AlertTopicArn
          GIT_SHA: !Ref GitSha
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SSMParameterName}
        - Statement:
            - Effect: Allow
              Action: sns:Publish
              Resource: !Ref AlertTopicArn
      Events:
        WeeklySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 21 ? * SUN *)
            Description: Run todoist backlog scheduler every Sunday at 9PM UTC

  SchedulerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${SchedulerFunction}
      RetentionInDays: 30

  SchedulerFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: SchedulerFunction threw / timed out / OOMed
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref SchedulerFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn

  SchedulerRuleFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Weekly scheduler rule failed to invoke target
      Namespace: AWS/Events
      MetricName: FailedInvocations
      Dimensions:
        - Name: RuleName
          Value: !Ref SchedulerFunctionWeeklySchedule
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn

Outputs:
  SchedulerFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt SchedulerFunction.Arn
