name: Deploy

# Triggered by CI success on main (covers GITHUB_TOKEN auto-merges, which do not
# fire `push` workflows) and by workflow_dispatch (break-glass). No `push` trigger —
# that would double-deploy on human/PAT merges that already run CI.
# Deploy SHA: workflow_run → head_sha of the CI run; workflow_dispatch → github.sha.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

# OIDC → github-actions-deploy (trust: repo:jsolly/todoist-backlog-scheduler:ref:refs/heads/main).
permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: deploy
    # workflow_run fires on any conclusion — only deploy on green CI.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # workflow_run default checkout is the workflow file's default branch tip,
          # not the CI commit — pin to the SHA that just passed CI.
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          # deploy-drift resolves Deploy-Commit against origin/main history.
          fetch-depth: 0

      - name: Refuse stale deploy
        if: github.event_name == 'workflow_run'
        env:
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          # cancel-in-progress:false queues overlapping deploys; drop any whose
          # commit main has already moved past (matches stocktextalerts).
          tip="$(git ls-remote origin refs/heads/main | cut -f1)"
          if [ "$tip" != "$DEPLOY_SHA" ]; then
            echo "Deploy triggered for $DEPLOY_SHA but main is now at $tip; refusing stale deploy."
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: jdx/mise-action@v2

      - run: npm ci

      - name: Refuse infra-pending deploys
        if: github.event_name == 'workflow_run'
        env:
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          # Diff the landed commit against its first parent (merge commits: first parent = main tip before merge).
          if ! git rev-parse --verify -q "${DEPLOY_SHA}^" >/dev/null; then
            echo "No parent for $DEPLOY_SHA; cannot verify template diff — refusing."
            exit 1
          fi
          changed="$(git diff --name-only "${DEPLOY_SHA}^" "$DEPLOY_SHA")"
          if [ -z "$changed" ]; then
            echo "git diff returned no files — cannot verify; refusing deploy."
            exit 1
          fi
          if grep -qx 'aws/template.yaml' <<<"$changed"; then
            echo "aws/template.yaml changed in this commit."
            echo "Run npm run deploy:infra locally with admin MFA, then re-run this workflow."
            exit 1
          fi

      - name: sam build
        run: |
          set -euo pipefail
          export PATH="$PWD/node_modules/.bin:$PATH"
          # samconfig.toml is gitignored — pass template/base-dir explicitly (matches ci.yml).
          sam build -t aws/template.yaml --base-dir .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::730335616323:role/github-actions-deploy
          aws-region: us-east-1

      - name: Deploy SchedulerFunction
        run: |
          set -euo pipefail
          STACK=todoist-backlog-scheduler
          COMMIT="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"
          for LOGICAL in SchedulerFunction; do
            fn=$(aws cloudformation describe-stack-resource \
              --stack-name "$STACK" --logical-resource-id "$LOGICAL" \
              --query 'StackResourceDetail.PhysicalResourceId' --output text)
            (cd ".aws-sam/build/$LOGICAL" && zip -qr "../$LOGICAL.zip" .)
            out="$(aws lambda update-function-code \
              --function-name "$fn" \
              --zip-file "fileb://.aws-sam/build/$LOGICAL.zip" \
              --query '[CodeSha256, FunctionArn]' --output text)"
            aws lambda wait function-updated-v2 --function-name "$fn"
            read -r sha arn <<<"$out"
            err=""
            for attempt in 1 2 3; do
              if err="$(aws lambda tag-resource --resource "$arn" \
                --tags "Deploy-Sha256=$sha,Deploy-Commit=$COMMIT" 2>&1 >/dev/null)"; then
                err=""
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "✗ could not tag $arn with deploy provenance after 3 attempts. Last error: ${err:-unknown}" >&2
                exit 1
              fi
              echo "  … tag-resource failed (attempt $attempt/3) — retrying" >&2
              sleep "$attempt"
            done
            echo "✓ $LOGICAL → $fn ($sha)"
          done

      - name: Deploy drift check
        run: npm run check:deploy-drift
