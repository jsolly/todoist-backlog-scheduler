AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Todoist Backlog Scheduler - distributes undated tasks across the week

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures:
      - arm64
    Timeout: 60
    MemorySize: 256
    Environment:
      Variables:
        # The esbuild build emits Sourcemap:true; this makes the Node runtime
        # actually consume it, so CloudWatch stack traces map to .ts source
        # (the sourcesContent travels in the bundle). Cheap for a weekly cron.
        NODE_OPTIONS: --enable-source-maps

Parameters:
  AlertTopicArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /shared-infra/alert-topic-arn
  MaxTasksPerDay:
    Type: Number
    Default: 0
    Description: Max tasks per day (0 = no limit, distributes evenly with no cap)
  GitSha:
    Type: String
    Default: unknown
  TodoistApiKeySsmParam:
    Type: String
    Default: /todoist-backlog-scheduler/api-key
    Description: >-
      SSM SecureString param NAME (not the value) holding the Todoist API key.
      Single source for the env var + IAM ARN below so they can't drift.

Resources:
  SchedulerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      # Hardcoded literal to break the circular dependency between the function's
      # LoggingConfig.LogGroup and a !Sub on ${SchedulerFunction}. Must stay in
      # lockstep with FunctionName below.
      LogGroupName: /aws/lambda/todoist-backlog-scheduler
      RetentionInDays: 30

  SchedulerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Format: cjs
        Target: node24
        Sourcemap: true
        EntryPoints:
          - scheduler.ts
    Properties:
      FunctionName: todoist-backlog-scheduler
      CodeUri: aws/src/handlers
      Handler: scheduler.handler
      Environment:
        Variables:
          # The param NAME only — not the secret value. The function fetches the
          # SecureString at runtime (src/shared/secrets.ts) so the key never sits
          # in a plaintext env var (readable via lambda:GetFunctionConfiguration
          # regardless of NoEcho). Design: shared-infra
          # docs/specs/2026-06-22-secret-runtime-fetch-design.md.
          TODOIST_API_KEY_SSM_PARAM: !Ref TodoistApiKeySsmParam
          MAX_TASKS_PER_DAY: !Ref MaxTasksPerDay
          GIT_SHA: !Ref GitSha
      # Least-privilege: read ONLY the one SecureString this function needs (same
      # !Ref as the env var above, so the grant can't drift from what's fetched).
      # No kms:Decrypt needed — the param uses the AWS-managed alias/aws/ssm key,
      # whose key policy already delegates decryption to account IAM via
      # kms:ViaService (add an explicit kms:Decrypt only for a customer CMK). Keep
      # the action singular (ssm:GetParameter); the function never lists/batches.
      Policies:
        - Statement:
            - Sid: ReadTodoistApiKey
              Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${TodoistApiKeySsmParam}"
      LoggingConfig:
        LogGroup: !Ref SchedulerLogGroup
      Events:
        WeeklySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 21 ? * SUN *)
            Description: Run todoist backlog scheduler every Sunday at 9PM UTC

  SchedulerLambdaErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: todoist-backlog-scheduler-lambda-errors
      AlarmDescription: SchedulerFunction crashed / timed out / OOMed
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref SchedulerFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  SchedulerErrorLogFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref SchedulerLogGroup
      FilterPattern: '{ $.level = "error" }'
      MetricTransformations:
        - MetricNamespace: todoist-backlog-scheduler
          MetricName: ErrorLogCount
          MetricValue: "1"
          DefaultValue: 0

  SchedulerErrorLogAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: todoist-backlog-scheduler-error-log-count
      AlarmDescription: error logged in todoist-backlog-scheduler Lambda
      Namespace: todoist-backlog-scheduler
      MetricName: ErrorLogCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  SchedulerRuleFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: todoist-backlog-scheduler-rule-failures
      AlarmDescription: Weekly scheduler rule failed to invoke target
      Namespace: AWS/Events
      MetricName: FailedInvocations
      Dimensions:
        - Name: RuleName
          Value: !Ref SchedulerFunctionWeeklySchedule
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

Outputs:
  SchedulerFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt SchedulerFunction.Arn
