AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Todoist Backlog Scheduler - distributes undated tasks across the week

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures:
      - arm64
    Timeout: 60
    MemorySize: 256

Parameters:
  SSMParameterName:
    Type: String
    Default: /todoist-backlog-scheduler/api-key
    Description: SSM Parameter Store path for the Todoist API key
  AlertTopicArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /alert-hub/alert-topic-arn
  GitSha:
    Type: String
    Default: unknown

Resources:
  SchedulerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      # Hardcoded literal to break the circular dependency between the function's
      # LoggingConfig.LogGroup and a !Sub on ${SchedulerFunction}. Must stay in
      # lockstep with FunctionName below.
      LogGroupName: /aws/lambda/todoist-backlog-scheduler
      RetentionInDays: 30

  SchedulerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Format: cjs
        Target: node24
        Sourcemap: true
        EntryPoints:
          - scheduler.ts
    Properties:
      FunctionName: todoist-backlog-scheduler
      CodeUri: aws/src/handlers
      Handler: scheduler.handler
      Environment:
        Variables:
          SSM_PARAMETER_NAME: !Ref SSMParameterName
          GIT_SHA: !Ref GitSha
      LoggingConfig:
        LogGroup: !Ref SchedulerLogGroup
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SSMParameterName}
      Events:
        WeeklySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 21 ? * SUN *)
            Description: Run todoist backlog scheduler every Sunday at 9PM UTC

  SchedulerLambdaErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: todoist-backlog-scheduler-lambda-errors
      AlarmDescription: SchedulerFunction crashed / timed out / OOMed
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref SchedulerFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  SchedulerErrorLogFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref SchedulerLogGroup
      FilterPattern: '{ $.level = "error" }'
      MetricTransformations:
        - MetricNamespace: todoist-backlog-scheduler
          MetricName: ErrorLogCount
          MetricValue: "1"
          DefaultValue: 0

  SchedulerErrorLogAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: todoist-backlog-scheduler-error-log-count
      AlarmDescription: error logged in todoist-backlog-scheduler Lambda
      Namespace: todoist-backlog-scheduler
      MetricName: ErrorLogCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  SchedulerRuleFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: todoist-backlog-scheduler-rule-failures
      AlarmDescription: Weekly scheduler rule failed to invoke target
      Namespace: AWS/Events
      MetricName: FailedInvocations
      Dimensions:
        - Name: RuleName
          Value: !Ref SchedulerFunctionWeeklySchedule
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

Outputs:
  SchedulerFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt SchedulerFunction.Arn
